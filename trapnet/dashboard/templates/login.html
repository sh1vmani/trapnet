<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trapnet - login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #4a9eff;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.4rem;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: #0d1b2a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 1.25rem;
    }

    input[type="password"]:focus {
      border-color: #4a9eff;
    }

    button {
      width: 100%;
      padding: 0.65rem;
      background: #4a9eff;
      color: #0d1b2a;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover { background: #6ab4ff; }

    .error {
      background: #3d1a1a;
      border: 1px solid #7a2020;
      border-radius: 4px;
      color: #ff6b6b;
      font-size: 0.85rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>trapnet</h1>
    <p class="subtitle">honeypot dashboard</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autofocus autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
